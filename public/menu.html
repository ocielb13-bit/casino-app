<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú Casino</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>🎰 Mi Casino</h1>
      <p id="playerLine" class="muted"></p>

      <div class="kpi">
        <div class="pill">Saldo: <strong id="balanceLine">0</strong></div>
        <div class="pill">Free spins: <strong id="freeLine">0</strong></div>
        <div class="pill">Banco free: <strong id="bankLine">0</strong></div>
      </div>

      <div class="game-grid">
        <a class="game-card" href="/slots.html">
          <div class="game-icon">🎰</div>
          <div class="game-name">Slots</div>
          <div class="game-desc">Asian Dragon disponible</div>
        </a>

        <a class="game-card" href="/ruleta.html">
          <div class="game-icon">🎡</div>
          <div class="game-name">Ruleta</div>
          <div class="game-desc">Mesa visual simple</div>
        </a>
      </div>

      <div class="row" style="margin-top: 16px;">
        <button type="button" class="secondary" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <script src="/menu.js"></script>
</body>
</html>
