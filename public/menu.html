<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="page">

    <div class="card">

      <!-- HEADER -->
      <div class="user-top">
        <div>
          <h1>🎰 Casino</h1>
          <p class="muted" id="playerLine">Cargando...</p>
        </div>
        <button class="secondary" onclick="logout()">Cerrar sesión</button>
      </div>

      <!-- KPIs -->
      <div class="kpi">
        <div class="pill">💰 Saldo: <strong id="saldo">0</strong></div>
        <div class="pill">🎮 Juegos: <strong>2</strong></div>
      </div>

      <!-- JUEGOS -->
      <div class="game-grid">

        <a href="/slots.html" class="game-card">
          <div class="game-icon">🐉</div>
          <div class="game-name">Slots</div>
          <div class="game-desc">Girá y ganá premios épicos</div>
        </a>

        <a href="/ruleta.html" class="game-card">
          <div class="game-icon">🎡</div>
          <div class="game-name">Ruleta</div>
          <div class="game-desc">Elegí tu número y probá suerte</div>
        </a>

      </div>

    </div>

  </div>

<script>
async function api(path) {
  const token = localStorage.getItem("token");

  const res = await fetch(path, {
    headers: { Authorization: "Bearer " + token }
  });

  if (!res.ok) {
    localStorage.removeItem("token");
    window.location.href = "/";
    return;
  }

  return res.json();
}

async function loadMe() {
  const me = await api("/api/me");
  document.getElementById("playerLine").textContent = "Jugador: " + me.username;
  document.getElementById("saldo").textContent = me.balance;
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/";
}

loadMe();
</script>

</body>
</html>
