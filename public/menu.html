<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú Casino</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>🎰 Mi Casino</h1>
      <p id="playerLine"></p>

      <div class="kpi">
        <div class="pill">Saldo: <strong id="balanceLine">0</strong></div>
        <div class="pill">Free spins: <strong id="freeLine">0</strong></div>
        <div class="pill">Banco free: <strong id="bankLine">0</strong></div>
      </div>

      <div class="row">
        <button type="button" onclick="go('slots')">🎰 Slots</button>
        <button type="button" onclick="go('ruleta')">🎡 Ruleta</button>
      </div>

      <div class="row">
        <button type="button" class="secondary" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <script src="/menu.js"></script>
</body>
</html>
