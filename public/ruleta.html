<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Ruleta - Casino Virtual</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <!-- Header -->
      <div class="user-top">
        <div>
          <h1>🎲 Ruleta Pro</h1>
          <p class="muted" id="playerInfo">Cargando jugador...</p>
        </div>
        <div style="text-align: right;">
          <strong>Saldo: <span id="balanceDisplay" style="color:#ffd700;">1000</span></strong>
          <button type="button" class="secondary" onclick="goToCasino()">← Volver al Casino</button>
        </div>
      </div>

      <div class="roulette-container">
        <!-- Rueda con animación realista -->
        <canvas id="rouletteCanvas" width="560" height="560"></canvas>

        <!-- Fichas para apostar -->
        <div class="row" style="justify-content: center; margin: 20px 0;">
          <button class="chip-btn" onclick="selectedChip=10">10</button>
          <button class="chip-btn" onclick="selectedChip=50">50</button>
          <button class="chip-btn" onclick="selectedChip=100">100</button>
          <button class="chip-btn" onclick="selectedChip=500">500</button>
        </div>

        <!-- Mesa de apuestas mejorada -->
        <div id="betTable" class="roulette-table">
          <!-- Se llena dinámicamente desde ruleta.js -->
        </div>

        <button onclick="spinRoulette()" class="big-btn">🚀 GIRAR LA RULETA</button>
      </div>

      <p id="rouletteMsg" style="margin-top:20px; font-size:1.3rem; min-height:30px;"></p>

      <!-- Botones inferiores -->
      <div class="row" style="margin-top: 30px;">
        <button type="button" class="secondary" onclick="clearBets()">Limpiar apuestas</button>
        <button type="button" class="secondary" onclick="goToCasino()">Volver al menú</button>
      </div>
    </div>
  </div>

  <script src="/ruleta.js"></script>
  <script>
    // Inicialización automática
    window.onload = function() {
      initRoulette();
      loadPlayerInfo(); // usa tu función existente de auth
    };

    // Función auxiliar para volver al casino (ya existía)
    function goToCasino() {
      window.location.href = "/casino.html";
    }

    function loadPlayerInfo() {
      // Reutiliza tu lógica de /api/me
      fetch('/api/me', {
        headers: { Authorization: 'Bearer ' + (localStorage.getItem('token') || '') }
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('playerInfo').textContent = `Jugador: ${data.username}`;
        document.getElementById('balanceDisplay').textContent = data.balance;
      });
    }
  </script>
</body>
</html>
