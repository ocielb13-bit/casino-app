<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casino Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <div class="card" style="max-width: 460px;">
      <h1>🎰 Casino Login</h1>
      <p class="muted">Ingresá con tu usuario y contraseña.</p>

      <input id="name" placeholder="Usuario" autocomplete="username">
      <input id="pass" type="password" placeholder="Contraseña" autocomplete="current-password">

      <button type="button" onclick="login()">Entrar</button>

      <p id="msg"></p>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
