<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐉 Asian Dragon Slot</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="page">
    <div class="machine">
      <div class="slot-shell">

        <!-- 🔝 HEADER -->
        <div class="user-top">
          <div>
            <h1>🐉 Asian Dragon Slot</h1>
            <p class="muted" id="playerLine">Cargando...</p>
          </div>

          <button class="secondary" onclick="window.location.href='/menu.html'">
            ⬅ Volver
          </button>
        </div>

        <!-- 💰 STATS -->
        <div class="kpi">
          <div class="pill">💰 Saldo: <strong id="saldo">0</strong></div>
          <div class="pill">🌀 Free Spins: <strong id="freeLine">0</strong></div>
          <div class="pill">🏦 Banco FS: <strong id="bankLine">0</strong></div>
          <div class="pill">💎 Jackpot: <strong id="jackpotLine">1000</strong></div>
          <div class="pill">🎯 Apuesta: <strong id="betDisplay">10</strong></div>
        </div>

        <!-- 🎰 REELS -->
        <div class="grid">

          <!-- FILA 1 -->
          <div class="row reels">
            <div class="reel" id="c1_0"><img id="img-c1_0"></div>
            <div class="reel" id="c1_1"><img id="img-c1_1"></div>
            <div class="reel" id="c1_2"><img id="img-c1_2"></div>
            <div class="reel" id="c1_3"><img id="img-c1_3"></div>
            <div class="reel" id="c1_4"><img id="img-c1_4"></div>
          </div>

          <!-- FILA 2 -->
          <div class="row reels">
            <div class="reel" id="c2_0"><img id="img-c2_0"></div>
            <div class="reel" id="c2_1"><img id="img-c2_1"></div>
            <div class="reel" id="c2_2"><img id="img-c2_2"></div>
            <div class="reel" id="c2_3"><img id="img-c2_3"></div>
            <div class="reel" id="c2_4"><img id="img-c2_4"></div>
          </div>

          <!-- FILA 3 -->
          <div class="row reels">
            <div class="reel" id="c3_0"><img id="img-c3_0"></div>
            <div class="reel" id="c3_1"><img id="img-c3_1"></div>
            <div class="reel" id="c3_2"><img id="img-c3_2"></div>
            <div class="reel" id="c3_3"><img id="img-c3_3"></div>
            <div class="reel" id="c3_4"><img id="img-c3_4"></div>
          </div>

        </div>

        <!-- 🎮 CONTROLES -->
        <div class="controls">

          <!-- BOTONES DE APUESTA -->
          <div class="bet-controls">
            <button onclick="changeBet(1)">+1</button>
            <button onclick="changeBet(20)">+20</button>
            <button onclick="changeBet(100)">+100</button>
          </div>

          <!-- BOTÓN GIRAR -->
          <button id="spinBtn" class="spin-btn" onclick="jugar()">
            🎰 GIRAR
          </button>

        </div>

        <!-- 📢 MENSAJES -->
        <div class="results">
          <p id="resultado"></p>
          <p id="detallePago"></p>
          <p id="bonusHint"></p>
        </div>

      </div>
    </div>
  </div>

  <script src="/slots.js"></script>
</body>
</html>
