<!DOCTYPE html>
<html>
<head>
  <title>Slots PRO</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .slot-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 20px;
    }

    .row-section {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .top-row {
      margin-left: 40px;
    }

    .bottom-row {
      margin-left: 40px;
    }

    /* 🔥 CORRECCIÓN IMPORTANTE */
    .center-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .reel {
      width: 70px;
      height: 70px;
      border: 2px solid gold;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: #111;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>

</head>
<body>

<h1>🎰 Slots PRO</h1>

<p id="saldo">Cargando...</p>

<div class="slot-container">

  <!-- TOP -->
  <div class="row-section top-row">
    <div class="reel" id="tr1">❓</div>
    <div class="reel" id="tr2">❓</div>
    <div class="reel" id="tr3">❓</div>
  </div>

  <!-- CENTRO -->
  <div class="center-grid">

    <!-- FILA 1 -->
    <div class="row">
      <div class="reel" id="c1_0">❓</div>
      <div class="reel" id="c1_1">❓</div>
      <div class="reel" id="c1_2">❓</div>
      <div class="reel" id="c1_3">❓</div>
      <div class="reel" id="c1_4">❓</div>
    </div>

    <!-- FILA 2 -->
    <div class="row">
      <div class="reel" id="c2_0">❓</div>
      <div class="reel" id="c2_1">❓</div>
      <div class="reel" id="c2_2">❓</div>
      <div class="reel" id="c2_3">❓</div>
      <div class="reel" id="c2_4">❓</div>
    </div>

  </div>

  <!-- BOTTOM -->
  <div class="row-section bottom-row">
    <div class="reel" id="br1">❓</div>
    <div class="reel" id="br2">❓</div>
    <div class="reel" id="br3">❓</div>
  </div>

</div>

<input id="apuesta" type="number" placeholder="Apuesta">
<br>
<button onclick="jugar()">🎰 GIRAR</button>

<p id="resultado"></p>

<br>
<button onclick="window.location.href='/menu.html'">⬅ Volver</button>

<!-- 🔊 SONIDOS -->
<audio id="spinSound" src="https://www.myinstants.com/media/sounds/slot-machine.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/win.mp3"></audio>

<script src="/slots.js"></script>

</body>
</html>
