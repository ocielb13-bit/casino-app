<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asian Dragon Slot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <div class="machine">
      <div class="slot-shell">
        <div class="user-top" style="margin-bottom: 4px;">
          <div>
            <h1>🐉 Asian Dragon Slot</h1>
            <p class="muted" id="playerLine">Cargando...</p>
          </div>
          <button type="button" class="secondary" onclick="window.location.href='/menu.html'">⬅ Volver</button>
        </div>

        <div class="kpi">
          <div class="pill">Saldo: <strong id="saldo">0</strong></div>
          <div class="pill">Free Spins: <strong id="freeLine">0</strong></div>
          <div class="pill">Banco FS: <strong id="bankLine">0</strong></div>
          <div class="pill">RTP: <strong id="rtpLine">96</strong>%</div>
          <div class="pill">Jackpot: <strong id="jackpotLine">1000</strong></div>
        </div>

        <div class="slot-selector">
          <div class="slot-card active">
            <div style="font-size:36px">🐉</div>
            <strong>Asian Dragon</strong>
            <div class="game-desc">Activo</div>
          </div>
          <div class="slot-card disabled">
            <div style="font-size:36px">🍒</div>
            <strong>Clásico</strong>
            <div class="game-desc">Próximamente</div>
          </div>
          <div class="slot-card disabled">
            <div style="font-size:36px">🎴</div>
            <strong>Bonus</strong>
            <div class="game-desc">Próximamente</div>
          </div>
        </div>

        <div class="grid">
          <div class="row reels">
            <div class="reel" id="c1_0"><img id="img-c1_0" alt=""></div>
            <div class="reel" id="c1_1"><img id="img-c1_1" alt=""></div>
            <div class="reel" id="c1_2"><img id="img-c1_2" alt=""></div>
            <div class="reel" id="c1_3"><img id="img-c1_3" alt=""></div>
            <div class="reel" id="c1_4"><img id="img-c1_4" alt=""></div>
          </div>

          <div class="row reels">
            <div class="reel" id="c2_0"><img id="img-c2_0" alt=""></div>
            <div class="reel" id="c2_1"><img id="img-c2_1" alt=""></div>
            <div class="reel" id="c2_2"><img id="img-c2_2" alt=""></div>
            <div class="reel" id="c2_3"><img id="img-c2_3" alt=""></div>
            <div class="reel" id="c2_4"><img id="img-c2_4" alt=""></div>
          </div>

          <div class="row reels">
            <div class="reel" id="c3_0"><img id="img-c3_0" alt=""></div>
            <div class="reel" id="c3_1"><img id="img-c3_1" alt=""></div>
            <div class="reel" id="c3_2"><img id="img-c3_2" alt=""></div>
            <div class="reel" id="c3_3"><img id="img-c3_3" alt=""></div>
            <div class="reel" id="c3_4"><img id="img-c3_4" alt=""></div>
          </div>
        </div>

        <div class="row" style="align-items:center;">
          <input id="apuesta" type="number" min="1" inputmode="numeric" autocomplete="off" placeholder="Apuesta">
          <button id="spinBtn" type="button" onclick="jugar()">🎰 GIRAR</button>
          <button type="button" class="secondary" onclick="window.location.href='/menu.html'">⬅ Volver</button>
        </div>

        <p id="resultado"></p>
        <p id="detallePago"></p>
        <p id="bonusHint"></p>
      </div>
    </div>
  </div>

  <script src="/slots.js"></script>
</body>
</html>
