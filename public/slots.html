<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐉 Asian Dragon Slot</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="page">
    <div class="machine">
      <div class="slot-shell">

        <!-- 🔝 HEADER -->
        <div class="top-bar">
          <div>
            <h1 class="title">🐉 Asian Dragon</h1>
            <p class="muted" id="playerLine">Cargando...</p>
          </div>

          <button class="btn-back" onclick="window.location.href='/menu.html'">
            ⬅
          </button>
        </div>

        <!-- 💰 PANEL -->
        <div class="stats">

          <div class="stat">💰 <span id="saldo">0</span></div>
          <div class="stat">🌀 <span id="freeLine">0</span></div>
          <div class="stat">🏦 <span id="bankLine">0</span></div>
          <div class="stat">💎 <span id="jackpotLine">1000</span></div>
          <div class="stat bet">🎯 <span id="betDisplay">10</span></div>

        </div>

        <!-- 🎰 SLOT GRID REAL -->
        <div class="slot-grid">

          <!-- FILA 1 -->
          <div class="reel"><img id="img-c1_0"></div>
          <div class="reel"><img id="img-c1_1"></div>
          <div class="reel"><img id="img-c1_2"></div>
          <div class="reel"><img id="img-c1_3"></div>
          <div class="reel"><img id="img-c1_4"></div>

          <!-- FILA 2 -->
          <div class="reel"><img id="img-c2_0"></div>
          <div class="reel"><img id="img-c2_1"></div>
          <div class="reel"><img id="img-c2_2"></div>
          <div class="reel"><img id="img-c2_3"></div>
          <div class="reel"><img id="img-c2_4"></div>

          <!-- FILA 3 -->
          <div class="reel"><img id="img-c3_0"></div>
          <div class="reel"><img id="img-c3_1"></div>
          <div class="reel"><img id="img-c3_2"></div>
          <div class="reel"><img id="img-c3_3"></div>
          <div class="reel"><img id="img-c3_4"></div>

        </div>

        <!-- 🎮 CONTROLES -->
        <div class="controls">

          <!-- APUESTAS -->
          <div class="bet-controls">
            <button onclick="changeBet(10)">+10</button>
            <button onclick="changeBet(100)">+100</button>
            <button onclick="changeBet(1000)">+1000</button>
          </div>

<div class="bet-controls">
  <button onclick="changeBet(-1000)">-1000</button>
  <button onclick="changeBet(-100)">-100</button>
  <button onclick="changeBet(-10)">-10</button>

  <button onclick="changeBet(10)">+10</button>
  <button onclick="changeBet(100)">+100</button>
  <button onclick="changeBet(1000)">+1000</button>
</div>

          <!-- SPIN -->
          <button id="spinBtn" class="spin-btn" onclick="jugar()">
            🎰 GIRAR
          </button>

        </div>

        <!-- 📢 RESULTADOS -->
        <div class="results">
          <p id="resultado"></p>
          <p id="detallePago"></p>
          <p id="bonusHint"></p>
        </div>

      </div>
    </div>
  </div>

  <script src="/slots.js"></script>
</body>
</html>
