<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asian Dragon Slot</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      margin: 20px 0;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .reel {
      width: 80px;
      height: 80px;
      background: #111;
      border: 2px solid #333;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reel img {
      width: 70px;
      height: 70px;
    }

    .win-low { border-color: #00ff99; }
    .win-mid { border-color: #00ccff; }
    .win-high { border-color: #ffcc00; }
    .win-jackpot { border-color: #ff0000; }

    button {
      padding: 10px 20px;
      font-size: 18px;
      background: gold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    input {
      padding: 8px;
      font-size: 16px;
      width: 100px;
      text-align: center;
    }

  </style>
</head>
